# Datasource — dev uses Quarkus Dev Services (auto-starts a PostgreSQL container)
quarkus.datasource.db-kind=postgresql

# Schema management
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%prod.quarkus.hibernate-orm.database.generation=validate

# SQL logging in dev
%dev.quarkus.hibernate-orm.log.sql=true

# import.sql only runs in dev; tests start with a clean schema
%test.quarkus.hibernate-orm.import-files=

# HTTP Basic auth (will be replaced with form login via Renarde)
quarkus.http.auth.basic=true

# CSRF: skip verification for non-form (JSON) requests so the REST API is unaffected.
# Renarde HTML form submissions use application/x-www-form-urlencoded and are still verified.
quarkus.rest-csrf.require-form-url-encoded=false
