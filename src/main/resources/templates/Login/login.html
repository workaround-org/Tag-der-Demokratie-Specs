<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anmelden — fundrays Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f3f4f6; color: #111827;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 0.75rem;
      padding: 2.5rem 2rem; width: 100%; max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .brand {
      font-size: 1.375rem; font-weight: 700; letter-spacing: 0.06em;
      text-transform: lowercase; margin-bottom: 2rem; text-align: center;
    }
    .brand span { color: #3b82f6; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.375rem; }
    input[type=text], input[type=password] {
      width: 100%; padding: 0.625rem 0.75rem; border: 1px solid #e5e7eb;
      border-radius: 0.375rem; font-size: 0.9375rem; transition: border-color 0.15s;
    }
    input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.12); }
    .btn-login {
      width: 100%; padding: 0.625rem; background: #3b82f6; color: #fff;
      border: none; border-radius: 0.375rem; font-size: 0.9375rem; font-weight: 500;
      cursor: pointer; margin-top: 0.5rem; transition: background 0.15s;
    }
    .btn-login:hover { background: #2563eb; }
    .alert-error {
      background: #fee2e2; color: #991b1b; border: 1px solid #fecaca;
      padding: 0.625rem 0.875rem; border-radius: 0.375rem; font-size: 0.875rem;
      margin-bottom: 1.25rem;
    }
  </style>
</head>
<body>
<div class="login-card">
  <div class="brand">fund<span>rays</span></div>

  {#if error}
  <div class="alert-error">Benutzername oder Passwort falsch.</div>
  {/if}

  <form method="post" action="/j_security_check">
    <div class="form-group">
      <label for="username">Benutzername</label>
      <input type="text" id="username" name="j_username" autocomplete="username" autofocus required>
    </div>
    <div class="form-group">
      <label for="password">Passwort</label>
      <input type="password" id="password" name="j_password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login">Anmelden</button>
  </form>
</div>
</body>
</html>
