name: Native Image

on:
  push:
    branches: [main]
    tags:
      # Maven Release Plugin default tag format: artifactId-version (e.g. fundrays-1.2.3)
      - 'fundrays-[0-9]*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      # Native compilation runs inside a Quarkus builder container — no local GraalVM needed.
      # Produces target/*-runner which Dockerfile.native copies in.
      - name: Build native executable
        run: ./mvnw package -Pnative -Dquarkus.native.container-build=true -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # latest on every push (main branch and release tags)
            type=raw,value=latest
            # semver tags from Maven Release Plugin tag format fundrays-X.Y.Z
            type=match,pattern=fundrays-(\d+\.\d+\.\d+),group=1
            type=match,pattern=fundrays-(\d+\.\d+)\.\d+,group=1
            type=match,pattern=fundrays-(\d+)\.\d+\.\d+,group=1

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/main/docker/Dockerfile.native
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
